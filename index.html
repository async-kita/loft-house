<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >
  <meta
    http-equiv="X-UA-Compatible"
    content="ie=edge"
  >
  <link
    rel="stylesheet"
    href="./styles/style.css"
  >
  <title>LoftHouse</title>
</head>
<body>
<header class="header">
  <div class="header__inner container">
    <div class="header__top">
      <a
        class="header__logo logo"
        href="#"
      >
        <img
          class="logo__image"
          src="./assets/icons/logo.svg"
          alt="Logo LoftHouse"
          width="134"
          height="66"
          loading="lazy"
        />
      </a>
      <nav class="header__menu">
        <ul class="header__menu-list">
          <li class="header__menu-item">
            <a
              class="header__menu-link"
              href="#"
            >
              О комплексе
            </a>
          </li>
          <li class="header__menu-item">
            <a
              class="header__menu-link"
              href="#"
            >
              Район
            </a>
          </li>
          <li class="header__menu-item">
            <a
              class="header__menu-link"
              href="#"
            >
              Каталог квартир
            </a>
          </li>
          <li class="header__menu-item">
            <a
              class="header__menu-link"
              href="#"
            >
              Ипотека
            </a>
          </li>
          <li class="header__menu-item">
            <a
              class="header__menu-link"
              href="#"
            >
              Контакты
            </a>
          </li>
        </ul>
      </nav>
    </div>
    <div class="header__body">
      <h1 class="header__title">
        Жилой комплекс в историческом центре
      </h1>
      <a
        class="header__link"
        href="#benefits"
      >
        <img
          class="header__link-icon"
          src="./assets/icons/mouse.svg"
          alt="Scroll next"
          width="40"
          height="40"
          loading="lazy"
        />
      </a>
    </div>
    <div class="header__footer">
      <a
        class="header__link-info header__link-info--map"
        href="#section-map"
      >
        Наб. реки Фонтанки 10-15
      </a>
      <a
        class="header__link-info header__link-info--tel"
        href="tel:+88121234567"
      >
        8 (812) 123-45-67
      </a>
    </div>
  </div>
</header>
</body>
</html>
